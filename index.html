<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEXA 소통기관</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <h1>NEXA 소통기관</h1>

        <nav>
            <button onclick="showHome()">홈</button>
            <button onclick="openWriteBox()">글 작성</button>
        </nav>
    </div>
</header>

<main>
    <section class="intro">
        <h2>모두의 이야기가 모이는 공간</h2>
        <p>소식, 의견, 질문을 자유롭게 작성해 보세요.</p>
    </section>

    <section class="search-area">
        <input
            type="text"
            id="searchInput"
            placeholder="제목 또는 내용 검색"
            oninput="renderPosts()"
        >
    </section>

    <section id="writeBox" class="write-box hidden">
        <h2>새 글 작성</h2>

        <input
            type="text"
            id="writerInput"
            placeholder="작성자 이름"
            maxlength="20"
        >

        <input
            type="text"
            id="titleInput"
            placeholder="글 제목"
            maxlength="50"
        >

        <textarea
            id="contentInput"
            placeholder="내용을 입력하세요."
            maxlength="1000"
        ></textarea>

        <div class="write-buttons">
            <button class="cancel-button" onclick="closeWriteBox()">
                취소
            </button>

            <button class="upload-button" onclick="addPost()">
                게시하기
            </button>
        </div>
    </section>

    <section class="post-section">
        <div class="post-title-line">
            <h2>최근 게시글</h2>

            <select id="sortSelect" onchange="renderPosts()">
                <option value="latest">최신순</option>
                <option value="likes">좋아요순</option>
            </select>
        </div>

        <div id="postList"></div>

        <p id="emptyMessage" class="empty-message">
            게시글이 없습니다.
        </p>
    </section>
</main>

<footer>
    <p>© 2026 NEXA Communication</p>
</footer>

<script src="script.js"></script>
</body>
</html>
